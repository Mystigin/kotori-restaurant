<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Kotori Menu Editor</title>
  <link rel="icon" href="images/kotori-logo.png" type="image/png">
  <style>
    :root {
      --bg: #0f0a06;
      --frame: #f3e7c9;
      --frame-2: #fff7e5;
      --ink: #f6e7c7;
      --vermillion: #c14a2a;
      --vermillion-2: #d77b5a;
      --gold: #b89968;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 20%, #2a160c, #0a0604);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 14px;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .gate {
      max-width: 420px;
      margin: 80px auto;
      padding: 28px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 8px;
      text-align: center;
    }
    .gate h1 { margin: 0 0 8px; font-size: 1.2rem; letter-spacing: .12em; text-transform: uppercase; color: var(--vermillion-2); }
    .gate p  { margin: 8px 0; font-size: .82rem; color: rgba(246,231,199,.78); line-height: 1.5; }
    .gate input[type="password"] {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-size: .92rem;
      font-family: inherit;
    }
    .gate button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: var(--vermillion);
      border: 0;
      border-radius: 4px;
      color: #fff;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      font-size: .76rem;
      cursor: pointer;
    }

    .head {
      width: 100%;
      max-width: 480px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
    }
    .head h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--vermillion-2);
    }
    .head .hint {
      font-size: .68rem;
      color: rgba(246,231,199,.6);
      letter-spacing: .04em;
    }

    /* ── BOOK PREVIEW ── */
    .book-frame {
      position: relative;
      width: min(96vw, 480px);
      aspect-ratio: 1.22 / 1;     /* matches phone book aspect */
      background:
        linear-gradient(180deg, var(--frame-2) 0%, var(--frame) 100%);
      border-radius: 4px;
      box-shadow: 0 18px 40px -10px rgba(0,0,0,.7);
      overflow: hidden;
      touch-action: none;
    }
    /* spine */
    .book-frame::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, rgba(0,0,0,.45) 0%, rgba(80,42,17,.3) 30%, rgba(255,220,160,.2) 50%, rgba(80,42,17,.3) 70%, rgba(0,0,0,.45) 100%);
      pointer-events: none;
      z-index: 5;
    }

    .page {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      overflow: hidden;
    }
    .page.left  { left: 0; }
    .page.right { right: 0; }

    .page img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 50%;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .page.is-active {
      box-shadow: inset 0 0 0 2px var(--vermillion);
    }

    /* ── PAGE PICKER (which menu is being edited) ── */
    .picker {
      width: min(96vw, 480px);
      display: flex;
      gap: 6px;
    }
    .picker button {
      flex: 1;
      padding: 8px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-family: inherit;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .picker button.is-active {
      background: rgba(193,74,42,.85);
      border-color: rgba(255,224,170,.7);
    }

    /* ── CONTROLS ── */
    .controls {
      width: min(96vw, 480px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.25);
      border-radius: 6px;
    }
    .row {
      display: grid;
      grid-template-columns: 80px 1fr 64px;
      gap: 10px;
      align-items: center;
    }
    .row label {
      font-size: .7rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(246,231,199,.7);
    }
    .row input[type="range"] {
      width: 100%;
      accent-color: var(--vermillion);
    }
    .row .val {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: .82rem;
      color: var(--ink);
    }

    .actions {
      width: min(96vw, 480px);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .actions button {
      flex: 1 1 0;
      min-width: 0;
      padding: 10px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-family: inherit;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .actions .primary {
      background: rgba(193,74,42,.85);
      border-color: rgba(255,224,170,.7);
    }

    .out {
      width: min(96vw, 480px);
      padding: 10px 12px;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,214,158,.2);
      border-radius: 4px;
      color: rgba(246,231,199,.85);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .72rem;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: auto;
      max-height: 220px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(193,74,42,.9);
      color: #fff;
      font-size: .72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 999;
    }
    .toast.on { opacity: 1; }
  </style>
</head>
<body>

  <!-- ── ACCESS GATE ── -->
  <div class="gate" id="gate" hidden>
    <h1>Menu Editor</h1>
    <p>This page is for editing the menu layout. Enter the access key to continue.</p>
    <input id="key-input" type="password" placeholder="access key" autocomplete="off">
    <button id="key-submit" type="button">unlock</button>
  </div>

  <!-- ── EDITOR (hidden until unlocked) ── -->
  <div id="editor" hidden style="display:contents">

    <div class="head">
      <h1>Menu Layout</h1>
      <span class="hint">drag the page · or use sliders</span>
    </div>

    <div class="book-frame" id="book">
      <div class="page left"  data-page="left"  data-menu="menu-1"><img id="img-menu-1" src="images/menu-1.png" alt=""></div>
      <div class="page right" data-page="right" data-menu="menu-2"><img id="img-menu-2" src="images/menu-2.png" alt=""></div>
    </div>

    <div class="picker">
      <button type="button" data-spread="0" class="is-active">Cover spread</button>
      <button type="button" data-spread="1">2nd spread</button>
    </div>

    <div class="controls">
      <div class="row">
        <label>Editing</label>
        <select id="select-target" style="grid-column: span 2; padding: 6px; background: rgba(0,0,0,.4); border: 1px solid rgba(255,214,158,.35); color: var(--ink); border-radius: 3px; font-family: inherit;">
          <option value="menu-1">menu-1 (left of cover spread)</option>
          <option value="menu-2">menu-2 (right of cover spread)</option>
          <option value="menu-3">menu-3 (right of 2nd spread)</option>
        </select>
      </div>
      <div class="row">
        <label>X</label>
        <input id="rng-x" type="range" min="0" max="100" step="0.5" value="50">
        <span class="val" id="val-x">50%</span>
      </div>
      <div class="row">
        <label>Y</label>
        <input id="rng-y" type="range" min="0" max="100" step="0.5" value="50">
        <span class="val" id="val-y">50%</span>
      </div>
      <div class="row">
        <label>Scale</label>
        <input id="rng-s" type="range" min="0.5" max="2" step="0.01" value="1">
        <span class="val" id="val-s">1.00×</span>
      </div>
    </div>

    <div class="actions">
      <button type="button" id="btn-reset">reset</button>
      <button type="button" id="btn-show-spec" class="primary">show spec</button>
      <button type="button" id="btn-copy">copy</button>
    </div>

    <pre class="out" id="out" hidden></pre>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    /* ── ACCESS GATE ────────────────────────────────────────────────────── */
    var ACCESS_KEY = 'kotori-edit-2025';
    var gate    = document.getElementById('gate');
    var editor  = document.getElementById('editor');
    var urlKey  = new URL(location.href).searchParams.get('key');
    var session = sessionStorage.getItem('kotori-editor-unlocked') === '1';
    if (urlKey === ACCESS_KEY || session) {
      sessionStorage.setItem('kotori-editor-unlocked', '1');
      editor.hidden = false;
    } else {
      gate.hidden = false;
      document.getElementById('key-submit').addEventListener('click', tryUnlock);
      document.getElementById('key-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') tryUnlock();
      });
      return;   // no editor logic until unlocked
    }
    function tryUnlock() {
      var v = document.getElementById('key-input').value.trim();
      if (v === ACCESS_KEY) {
        sessionStorage.setItem('kotori-editor-unlocked', '1');
        location.reload();
      } else {
        showToast('wrong key');
      }
    }

    /* ── STATE ──────────────────────────────────────────────────────────── */
    var STORAGE_KEY = 'kotori-menu-positions-v3';
    var DEFAULTS = {
      'menu-1': { x: 50, y: 50, s: 1 },
      'menu-2': { x: 50, y: 50, s: 1 },
      'menu-3': { x: 50, y: 50, s: 1 }
    };
    function loadMap() {
      try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')); }
      catch (e) { return Object.assign({}, DEFAULTS); }
    }
    function saveMap(m) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(m)); } catch (e) {}
    }
    var state = loadMap();
    var current = 'menu-1';     // which menu is being edited
    var spread  = 0;            // 0 = cover spread (menu-1 | menu-2), 1 = (blank | menu-3)

    /* ── DOM REFS ───────────────────────────────────────────────────────── */
    var rngX = document.getElementById('rng-x');
    var rngY = document.getElementById('rng-y');
    var rngS = document.getElementById('rng-s');
    var valX = document.getElementById('val-x');
    var valY = document.getElementById('val-y');
    var valS = document.getElementById('val-s');
    var sel  = document.getElementById('select-target');
    var book = document.getElementById('book');
    var pageLeft  = book.querySelector('.page.left');
    var pageRight = book.querySelector('.page.right');
    var imgs = {
      'menu-1': document.getElementById('img-menu-1'),
      'menu-2': document.getElementById('img-menu-2'),
      'menu-3': null     // created on demand
    };
    /* lazy-load menu-3 once */
    var img3 = new Image();
    img3.id = 'img-menu-3';
    img3.src = 'images/menu-3.png';
    img3.alt = '';
    imgs['menu-3'] = img3;

    /* ── RENDER ─────────────────────────────────────────────────────────── */
    function applyToImg(name) {
      var img = imgs[name];
      if (!img) return;
      var s = state[name];
      img.style.objectPosition = s.x.toFixed(1) + '% ' + s.y.toFixed(1) + '%';
      img.style.transform = 'scale(' + s.s.toFixed(3) + ')';
      img.style.transformOrigin = s.x.toFixed(1) + '% ' + s.y.toFixed(1) + '%';
    }
    function renderSpread() {
      // remove all current images from pages
      pageLeft.innerHTML = '';
      pageRight.innerHTML = '';
      pageLeft.removeAttribute('data-menu');
      pageRight.removeAttribute('data-menu');
      if (spread === 0) {
        pageLeft.appendChild(imgs['menu-1']);
        pageRight.appendChild(imgs['menu-2']);
        pageLeft.dataset.menu = 'menu-1';
        pageRight.dataset.menu = 'menu-2';
      } else {
        pageLeft.appendChild(imgs['menu-3']);
        pageLeft.dataset.menu = 'menu-3';
        // right page is blank in 2nd spread (back of menu-3 is the end-cover)
      }
      ['menu-1', 'menu-2', 'menu-3'].forEach(applyToImg);
      highlightActivePage();
    }
    function highlightActivePage() {
      pageLeft.classList.toggle('is-active',  pageLeft.dataset.menu === current);
      pageRight.classList.toggle('is-active', pageRight.dataset.menu === current);
    }
    function syncControls() {
      var s = state[current];
      rngX.value = s.x;  valX.textContent = s.x.toFixed(1) + '%';
      rngY.value = s.y;  valY.textContent = s.y.toFixed(1) + '%';
      rngS.value = s.s;  valS.textContent = s.s.toFixed(2) + '×';
      sel.value  = current;
      // when current menu isn't on the visible spread, switch spread
      if ((current === 'menu-1' || current === 'menu-2') && spread !== 0) { spread = 0; updateSpreadButtons(); renderSpread(); }
      if (current === 'menu-3' && spread !== 1) { spread = 1; updateSpreadButtons(); renderSpread(); }
      highlightActivePage();
    }
    function updateSpreadButtons() {
      Array.prototype.forEach.call(document.querySelectorAll('.picker button'), function (b) {
        b.classList.toggle('is-active', String(spread) === b.dataset.spread);
      });
    }

    /* ── INPUT WIRING ───────────────────────────────────────────────────── */
    function commit() {
      saveMap(state);
      applyToImg(current);
    }
    rngX.addEventListener('input', function () {
      state[current].x = parseFloat(rngX.value);
      valX.textContent = state[current].x.toFixed(1) + '%';
      commit();
    });
    rngY.addEventListener('input', function () {
      state[current].y = parseFloat(rngY.value);
      valY.textContent = state[current].y.toFixed(1) + '%';
      commit();
    });
    rngS.addEventListener('input', function () {
      state[current].s = parseFloat(rngS.value);
      valS.textContent = state[current].s.toFixed(2) + '×';
      commit();
    });
    sel.addEventListener('change', function () {
      current = sel.value;
      syncControls();
    });
    Array.prototype.forEach.call(document.querySelectorAll('.picker button'), function (b) {
      b.addEventListener('click', function () {
        spread = parseInt(b.dataset.spread, 10);
        updateSpreadButtons();
        renderSpread();
        // pick a sensible current target for this spread
        if (spread === 0 && current === 'menu-3') current = 'menu-1';
        if (spread === 1) current = 'menu-3';
        syncControls();
      });
    });
    /* tap a page in the book to make it the active editing target */
    book.addEventListener('click', function (e) {
      var page = e.target.closest('.page');
      if (!page || !page.dataset.menu) return;
      current = page.dataset.menu;
      syncControls();
    });

    /* drag on the active page to pan x/y; pinch to scale */
    var dragStart = null, pinchStart = null, startState = null;
    function ptDist(t1, t2) {
      var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }
    function getActiveImg() { return imgs[current]; }
    function getActivePage() {
      if (current === 'menu-1' || current === 'menu-3') return pageLeft;
      return pageRight;
    }

    book.addEventListener('touchstart', function (e) {
      var page = getActivePage();
      var rect = page.getBoundingClientRect();
      var t = e.touches[0];
      // only drag if the touch is within the active page
      if (t.clientX < rect.left || t.clientX > rect.right || t.clientY < rect.top || t.clientY > rect.bottom) return;
      e.preventDefault();
      startState = Object.assign({}, state[current]);
      if (e.touches.length === 1) {
        dragStart = { x: t.clientX, y: t.clientY, w: rect.width, h: rect.height };
        pinchStart = null;
      } else if (e.touches.length === 2) {
        pinchStart = { d: ptDist(e.touches[0], e.touches[1]) };
        dragStart = null;
      }
    }, { passive: false });
    book.addEventListener('touchmove', function (e) {
      if (!startState) return;
      e.preventDefault();
      if (e.touches.length === 1 && dragStart) {
        var dx = e.touches[0].clientX - dragStart.x;
        var dy = e.touches[0].clientY - dragStart.y;
        // 1px of drag ≈ 100/page_width % of object-position (object-fit cover)
        var nx = clamp(0, 100, startState.x - dx * (100 / dragStart.w));
        var ny = clamp(0, 100, startState.y - dy * (100 / dragStart.h));
        state[current].x = nx; state[current].y = ny;
      } else if (e.touches.length === 2 && pinchStart) {
        var d = ptDist(e.touches[0], e.touches[1]);
        var ratio = d / pinchStart.d;
        state[current].s = clamp(0.5, 2, startState.s * ratio);
      }
      commit();
      syncControls();
    }, { passive: false });
    function endDrag(e) {
      if (e) e.preventDefault();
      dragStart = null; pinchStart = null; startState = null;
    }
    book.addEventListener('touchend',    endDrag);
    book.addEventListener('touchcancel', endDrag);

    /* mouse drag (desktop) */
    var mouseDown = false;
    book.addEventListener('mousedown', function (e) {
      var page = getActivePage();
      var rect = page.getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
      e.preventDefault();
      mouseDown = true;
      startState = Object.assign({}, state[current]);
      dragStart  = { x: e.clientX, y: e.clientY, w: rect.width, h: rect.height };
    });
    window.addEventListener('mousemove', function (e) {
      if (!mouseDown || !startState || !dragStart) return;
      var dx = e.clientX - dragStart.x;
      var dy = e.clientY - dragStart.y;
      state[current].x = clamp(0, 100, startState.x - dx * (100 / dragStart.w));
      state[current].y = clamp(0, 100, startState.y - dy * (100 / dragStart.h));
      commit();
      syncControls();
    });
    window.addEventListener('mouseup', function () { mouseDown = false; startState = null; dragStart = null; });

    /* mouse wheel = scale (desktop convenience) */
    book.addEventListener('wheel', function (e) {
      if (!book.matches(':hover')) return;
      e.preventDefault();
      var step = e.deltaY > 0 ? -0.04 : 0.04;
      state[current].s = clamp(0.5, 2, state[current].s + step);
      commit();
      syncControls();
    }, { passive: false });

    /* ── ACTIONS ────────────────────────────────────────────────────────── */
    document.getElementById('btn-reset').addEventListener('click', function () {
      state = Object.assign({}, DEFAULTS);
      saveMap(state);
      ['menu-1','menu-2','menu-3'].forEach(applyToImg);
      syncControls();
      showToast('reset');
    });
    document.getElementById('btn-show-spec').addEventListener('click', function () {
      var out = document.getElementById('out');
      out.hidden = false;
      out.textContent = formatSpec();
      out.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    document.getElementById('btn-copy').addEventListener('click', function () {
      var spec = formatSpec();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(spec).then(
          function () { showToast('copied'); },
          function () { window.prompt('Copy this spec:', spec); }
        );
      } else {
        window.prompt('Copy this spec:', spec);
      }
    });
    function formatSpec() {
      var s = state;
      var lines = [
        '/* PHONE MENU SPEC',
        '   Paste this in chat for the assistant to bake in. */',
        JSON.stringify({
          'menu-1': s['menu-1'],
          'menu-2': s['menu-2'],
          'menu-3': s['menu-3']
        }, null, 2),
        '',
        '/* CSS form */',
        '@media (max-width: 600px) {'
      ];
      ['menu-1','menu-2','menu-3'].forEach(function (k) {
        var v = s[k];
        lines.push('  .book-mount.is-modal .page-image .page-image-img[src$="' + k + '.png"] {');
        lines.push('    object-position: ' + v.x.toFixed(1) + '% ' + v.y.toFixed(1) + '% !important;');
        lines.push('    transform: scale(' + v.s.toFixed(3) + ') !important;');
        lines.push('    transform-origin: ' + v.x.toFixed(1) + '% ' + v.y.toFixed(1) + '% !important;');
        lines.push('  }');
      });
      lines.push('}');
      return lines.join('\n');
    }

    /* ── UTIL ───────────────────────────────────────────────────────────── */
    function clamp(lo, hi, v) { return Math.max(lo, Math.min(hi, v)); }
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('on');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () { t.classList.remove('on'); }, 1400);
    }

    /* ── BOOT ───────────────────────────────────────────────────────────── */
    img3.onload = function () { /* nothing — already rendered if visible */ };
    renderSpread();
    syncControls();
  })();
  </script>
</body>
</html>
