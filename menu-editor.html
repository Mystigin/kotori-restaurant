<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>Kotori Menu Editor — v2</title>
  <link rel="icon" href="images/kotori-logo.png" type="image/png">
  <style>
    :root {
      --bg: #0f0a06;
      --frame: #f3e7c9;
      --frame-2: #fff7e5;
      --ink: #f6e7c7;
      --vermillion: #c14a2a;
      --vermillion-2: #d77b5a;
      --gold: #b89968;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 20%, #2a160c, #0a0604);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Manrope, Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
      overscroll-behavior: none;
    }

    /* ── ACCESS GATE ── */
    .gate {
      max-width: 420px;
      margin: 80px auto;
      padding: 28px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 8px;
      text-align: center;
    }
    .gate h1 { margin: 0 0 8px; font-size: 1.2rem; letter-spacing: .12em; text-transform: uppercase; color: var(--vermillion-2); }
    .gate p  { margin: 8px 0; font-size: .82rem; color: rgba(246,231,199,.78); line-height: 1.5; }
    .gate input[type="password"] {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-size: .92rem;
      font-family: inherit;
    }
    .gate button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: var(--vermillion);
      border: 0;
      border-radius: 4px;
      color: #fff;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      font-size: .76rem;
      cursor: pointer;
    }

    .head {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 14px;
    }
    .head h1 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--vermillion-2);
    }
    .head .hint {
      font-size: .68rem;
      color: rgba(246,231,199,.6);
      letter-spacing: .04em;
    }

    /* ── BOOK CANVAS ──
       Fixed aspect ratio (1.22:1). The editor canvas scales to viewport
       but everything inside is positioned in % of the canvas, so image
       layouts are LOCKED to the book — when the book scales up or down,
       images stay at the same relative position and size. */
    .book {
      position: relative;
      width: min(96vw, 520px);
      aspect-ratio: 1.22 / 1;
      background:
        linear-gradient(180deg, var(--frame-2) 0%, var(--frame) 100%);
      border-radius: 4px;
      box-shadow: 0 18px 40px -10px rgba(0,0,0,.7);
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    /* spine */
    .book::before {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      left: 50%;
      width: 6px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, rgba(0,0,0,.45) 0%, rgba(80,42,17,.3) 30%, rgba(255,220,160,.2) 50%, rgba(80,42,17,.3) 70%, rgba(0,0,0,.45) 100%);
      pointer-events: none;
      z-index: 50;
    }
    /* page divider faint outlines (visual reference only) */
    .book::after {
      content: "";
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 0 1px rgba(120,90,50,.18);
      pointer-events: none;
    }

    /* a freely-placed menu image, positioned in % of .book */
    .menu-img {
      position: absolute;
      display: block;
      pointer-events: auto;
      cursor: move;
      box-shadow: 0 4px 12px -4px rgba(0,0,0,.4);
      -webkit-user-drag: none;
      user-select: none;
      -webkit-user-select: none;
    }
    .menu-img.is-dim { opacity: .35; pointer-events: none; }
    .menu-img.is-active { outline: 2px solid var(--vermillion); outline-offset: 2px; z-index: 30; }

    /* ── CONTROLS ── */
    .picker {
      width: min(96vw, 520px);
      display: flex;
      gap: 6px;
    }
    .picker button {
      flex: 1;
      padding: 8px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-family: inherit;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .picker button.is-active {
      background: rgba(193,74,42,.85);
      border-color: rgba(255,224,170,.7);
    }

    .controls {
      width: min(96vw, 520px);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.25);
      border-radius: 6px;
    }
    .row {
      display: grid;
      grid-template-columns: 70px 1fr 80px;
      gap: 10px;
      align-items: center;
    }
    .row label {
      font-size: .7rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: rgba(246,231,199,.7);
    }
    .row input[type="range"] {
      width: 100%;
      accent-color: var(--vermillion);
    }
    .row .val {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: .82rem;
      color: var(--ink);
    }

    .actions {
      width: min(96vw, 520px);
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .actions button {
      flex: 1 1 0;
      min-width: 0;
      padding: 10px;
      background: rgba(15,9,5,.92);
      border: 1px solid rgba(255,214,158,.35);
      border-radius: 4px;
      color: var(--ink);
      font-family: inherit;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .18em;
      text-transform: uppercase;
      cursor: pointer;
    }
    .actions .primary {
      background: rgba(193,74,42,.85);
      border-color: rgba(255,224,170,.7);
    }

    .out {
      width: min(96vw, 520px);
      padding: 10px 12px;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,214,158,.2);
      border-radius: 4px;
      color: rgba(246,231,199,.85);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: .72rem;
      white-space: pre-wrap;
      word-break: break-all;
      overflow: auto;
      max-height: 240px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(193,74,42,.9);
      color: #fff;
      font-size: .72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
      z-index: 999;
    }
    .toast.on { opacity: 1; }
  </style>
</head>
<body>

  <!-- ── ACCESS GATE ── -->
  <div class="gate" id="gate" hidden>
    <h1>Menu Editor</h1>
    <p>Enter the access key to continue.</p>
    <input id="key-input" type="password" placeholder="access key" autocomplete="off">
    <button id="key-submit" type="button">unlock</button>
  </div>

  <!-- ── EDITOR ── -->
  <div id="editor" hidden style="display:contents">

    <div class="head">
      <h1>Book layout</h1>
      <span class="hint">drag image · or use sliders</span>
    </div>

    <div class="book" id="book">
      <!-- menu images are positioned in % of THIS book canvas -->
      <img class="menu-img" id="img-menu-1" data-menu="menu-1" src="images/menu-1.png" alt="">
      <img class="menu-img" id="img-menu-2" data-menu="menu-2" src="images/menu-2.png" alt="">
      <img class="menu-img" id="img-menu-3" data-menu="menu-3" src="images/menu-3.png" alt="">
    </div>

    <div class="picker">
      <button type="button" data-target="menu-1" class="is-active">menu-1</button>
      <button type="button" data-target="menu-2">menu-2</button>
      <button type="button" data-target="menu-3">menu-3</button>
    </div>

    <div class="controls">
      <div class="row">
        <label>X</label>
        <input id="rng-x" type="range" min="0" max="100" step="0.1" value="5">
        <span class="val" id="val-x">5.0%</span>
      </div>
      <div class="row">
        <label>Y</label>
        <input id="rng-y" type="range" min="0" max="100" step="0.1" value="8">
        <span class="val" id="val-y">8.0%</span>
      </div>
      <div class="row">
        <label>Width</label>
        <input id="rng-w" type="range" min="5" max="100" step="0.1" value="40">
        <span class="val" id="val-w">40.0%</span>
      </div>
      <div class="row">
        <label>Height</label>
        <input id="rng-h" type="range" min="5" max="200" step="0.1" value="84">
        <span class="val" id="val-h">84.0%</span>
      </div>
    </div>

    <div class="actions">
      <button type="button" id="btn-reset">reset</button>
      <button type="button" id="btn-show-spec" class="primary">show spec</button>
      <button type="button" id="btn-copy">copy</button>
    </div>

    <pre class="out" id="out" hidden></pre>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  (function () {
    'use strict';

    /* ── ACCESS GATE ────────────────────────────────────────────────────── */
    var ACCESS_KEY = 'kotori-edit-2025';
    var gate    = document.getElementById('gate');
    var editor  = document.getElementById('editor');
    var urlKey  = new URL(location.href).searchParams.get('key');
    var session = sessionStorage.getItem('kotori-editor-unlocked') === '1';
    if (urlKey === ACCESS_KEY || session) {
      sessionStorage.setItem('kotori-editor-unlocked', '1');
      editor.hidden = false;
    } else {
      gate.hidden = false;
      document.getElementById('key-submit').addEventListener('click', tryUnlock);
      document.getElementById('key-input').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') tryUnlock();
      });
      return;
    }
    function tryUnlock() {
      var v = document.getElementById('key-input').value.trim();
      if (v === ACCESS_KEY) {
        sessionStorage.setItem('kotori-editor-unlocked', '1');
        location.reload();
      } else {
        showToast('wrong key');
      }
    }

    /* ── STATE ──────────────────────────────────────────────────────────── */
    /* Each menu's layout is stored in % of the BOOK canvas:
         x/y = top-left position of the image
         w/h = explicit width and height
       Defaults position each image roughly within its target page. */
    var STORAGE_KEY = 'kotori-book-layout-v1';
    var DEFAULTS = {
      'menu-1': { x:  5, y: 8, w: 40, h: 84 },
      'menu-2': { x: 55, y: 8, w: 40, h: 84 },
      'menu-3': { x: 55, y: 8, w: 40, h: 84 }
    };
    function loadMap() {
      try {
        var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        return {
          'menu-1': Object.assign({}, DEFAULTS['menu-1'], saved['menu-1'] || {}),
          'menu-2': Object.assign({}, DEFAULTS['menu-2'], saved['menu-2'] || {}),
          'menu-3': Object.assign({}, DEFAULTS['menu-3'], saved['menu-3'] || {})
        };
      } catch (e) { return JSON.parse(JSON.stringify(DEFAULTS)); }
    }
    function saveMap(m) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(m)); } catch (e) {}
    }
    var state = loadMap();
    var current = 'menu-1';

    /* ── DOM REFS ───────────────────────────────────────────────────────── */
    var book = document.getElementById('book');
    var imgs = {
      'menu-1': document.getElementById('img-menu-1'),
      'menu-2': document.getElementById('img-menu-2'),
      'menu-3': document.getElementById('img-menu-3')
    };
    var rngX = document.getElementById('rng-x');
    var rngY = document.getElementById('rng-y');
    var rngW = document.getElementById('rng-w');
    var rngH = document.getElementById('rng-h');
    var valX = document.getElementById('val-x');
    var valY = document.getElementById('val-y');
    var valW = document.getElementById('val-w');
    var valH = document.getElementById('val-h');

    /* ── RENDER ─────────────────────────────────────────────────────────── */
    function applyToImg(name) {
      var img = imgs[name];
      var s = state[name];
      img.style.left   = s.x.toFixed(2) + '%';
      img.style.top    = s.y.toFixed(2) + '%';
      img.style.width  = s.w.toFixed(2) + '%';
      img.style.height = s.h.toFixed(2) + '%';
    }
    function renderAll() {
      ['menu-1','menu-2','menu-3'].forEach(applyToImg);
      ['menu-1','menu-2','menu-3'].forEach(function (name) {
        imgs[name].classList.toggle('is-active', name === current);
        imgs[name].classList.toggle('is-dim',    name !== current);
      });
    }
    function syncControls() {
      var s = state[current];
      rngX.value = s.x;  valX.textContent = s.x.toFixed(1) + '%';
      rngY.value = s.y;  valY.textContent = s.y.toFixed(1) + '%';
      rngW.value = s.w;  valW.textContent = s.w.toFixed(1) + '%';
      rngH.value = s.h;  valH.textContent = s.h.toFixed(1) + '%';
      Array.prototype.forEach.call(document.querySelectorAll('.picker button'), function (b) {
        b.classList.toggle('is-active', b.dataset.target === current);
      });
    }
    function commit() {
      saveMap(state);
      applyToImg(current);
    }

    /* ── INPUT WIRING ───────────────────────────────────────────────────── */
    rngX.addEventListener('input', function () {
      state[current].x = parseFloat(rngX.value);
      valX.textContent = state[current].x.toFixed(1) + '%';
      commit();
    });
    rngY.addEventListener('input', function () {
      state[current].y = parseFloat(rngY.value);
      valY.textContent = state[current].y.toFixed(1) + '%';
      commit();
    });
    rngW.addEventListener('input', function () {
      state[current].w = parseFloat(rngW.value);
      valW.textContent = state[current].w.toFixed(1) + '%';
      commit();
    });
    rngH.addEventListener('input', function () {
      state[current].h = parseFloat(rngH.value);
      valH.textContent = state[current].h.toFixed(1) + '%';
      commit();
    });
    Array.prototype.forEach.call(document.querySelectorAll('.picker button'), function (b) {
      b.addEventListener('click', function () {
        current = b.dataset.target;
        renderAll();
        syncControls();
      });
    });
    /* tap an image to make it the active target */
    book.addEventListener('click', function (e) {
      var img = e.target.closest('.menu-img');
      if (!img) return;
      current = img.dataset.menu;
      renderAll();
      syncControls();
    });

    /* drag the active image to reposition (1-finger touch / mouse).
       Pinch (2-finger) scales the active image proportionally. */
    var dragStart = null, pinchStart = null, startSt = null, bookRect = null;
    function ptDist(t1, t2) {
      var dx = t1.clientX - t2.clientX, dy = t1.clientY - t2.clientY;
      return Math.sqrt(dx*dx + dy*dy);
    }
    function tStart(touches) {
      var t = touches[0];
      bookRect = book.getBoundingClientRect();
      // only act if touch is within the active image's box
      var s = state[current];
      var ax = bookRect.left + s.x / 100 * bookRect.width;
      var ay = bookRect.top  + s.y / 100 * bookRect.height;
      var aw = s.w / 100 * bookRect.width;
      var ah = s.h / 100 * bookRect.height;
      if (t.clientX < ax || t.clientX > ax + aw || t.clientY < ay || t.clientY > ay + ah) return false;
      startSt = Object.assign({}, s);
      if (touches.length === 1) {
        dragStart = { x: t.clientX, y: t.clientY };
        pinchStart = null;
      } else {
        pinchStart = { d: ptDist(touches[0], touches[1]) };
        dragStart = null;
      }
      return true;
    }
    function tMove(touches) {
      if (!startSt || !bookRect) return;
      if (touches.length === 1 && dragStart) {
        var dx = touches[0].clientX - dragStart.x;
        var dy = touches[0].clientY - dragStart.y;
        var nx = clamp(0, 100, startSt.x + dx / bookRect.width * 100);
        var ny = clamp(0, 100, startSt.y + dy / bookRect.height * 100);
        state[current].x = nx;
        state[current].y = ny;
      } else if (touches.length === 2 && pinchStart) {
        var d = ptDist(touches[0], touches[1]);
        var ratio = d / pinchStart.d;
        state[current].w = clamp(5, 200, startSt.w * ratio);
        state[current].h = clamp(5, 200, startSt.h * ratio);
      }
      commit();
      syncControls();
    }
    function tEnd() {
      dragStart = null; pinchStart = null; startSt = null; bookRect = null;
    }
    book.addEventListener('touchstart', function (e) {
      if (!tStart(e.touches)) return;
      e.preventDefault();
    }, { passive: false });
    book.addEventListener('touchmove',  function (e) {
      if (!startSt) return;
      e.preventDefault();
      tMove(e.touches);
    }, { passive: false });
    book.addEventListener('touchend',    tEnd);
    book.addEventListener('touchcancel', tEnd);

    /* mouse equivalents */
    var mouseDown = false;
    book.addEventListener('mousedown', function (e) {
      if (!tStart([e])) return;
      e.preventDefault();
      mouseDown = true;
    });
    window.addEventListener('mousemove', function (e) {
      if (!mouseDown) return;
      tMove([e]);
    });
    window.addEventListener('mouseup', function () {
      mouseDown = false;
      tEnd();
    });

    /* ── ACTIONS ────────────────────────────────────────────────────────── */
    document.getElementById('btn-reset').addEventListener('click', function () {
      state = JSON.parse(JSON.stringify(DEFAULTS));
      saveMap(state);
      renderAll();
      syncControls();
      showToast('reset');
    });
    document.getElementById('btn-show-spec').addEventListener('click', function () {
      var out = document.getElementById('out');
      out.hidden = false;
      out.textContent = formatSpec();
      out.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    document.getElementById('btn-copy').addEventListener('click', function () {
      var spec = formatSpec();
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(spec).then(
          function () { showToast('copied'); },
          function () { window.prompt('Copy this spec:', spec); }
        );
      } else {
        window.prompt('Copy this spec:', spec);
      }
    });
    function formatSpec() {
      var s = state;
      var lines = [
        '/* PHONE BOOK LAYOUT — v2',
        '   Each menu image is positioned within the BOOK canvas in %.',
        '   Paste this in chat for the assistant to bake in. */',
        JSON.stringify(s, null, 2),
        '',
        '/* CSS form (each menu is positioned within the book area) */',
      ];
      ['menu-1','menu-2','menu-3'].forEach(function (k) {
        var v = s[k];
        lines.push('/* ' + k + ' */');
        lines.push('  left:   ' + v.x.toFixed(2) + '%');
        lines.push('  top:    ' + v.y.toFixed(2) + '%');
        lines.push('  width:  ' + v.w.toFixed(2) + '%');
        lines.push('  height: ' + v.h.toFixed(2) + '%');
      });
      return lines.join('\n');
    }

    /* ── UTIL ───────────────────────────────────────────────────────────── */
    function clamp(lo, hi, v) { return Math.max(lo, Math.min(hi, v)); }
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('on');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(function () { t.classList.remove('on'); }, 1400);
    }

    /* ── BOOT ───────────────────────────────────────────────────────────── */
    renderAll();
    syncControls();
  })();
  </script>
</body>
</html>
